kind = "web"
previewPath = "/"
title = "Civil Legacy Consultancy"
version = "1.0.0"
id = "artifacts/civil-legacy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20601
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/civil-legacy run dev"

[services.env]
PORT = "20601"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/civil-legacy", "run", "build"]
publicDir = "artifacts/civil-legacy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
